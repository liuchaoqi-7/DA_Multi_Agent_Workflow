name: Python Lint

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - '**.py'
      - '.github/workflows/python-lint.yml'
      - 'requirements.txt'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - '**.py'

jobs:
  flake8:
    name: Flake8 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-docstrings flake8-bugbear flake8-comprehensions

      - name: Run flake8
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Run flake8 (full check)
        run: |
          flake8 . \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=127 \
            --statistics \
            --exclude=.git,__pycache__,build,dist,.eggs,*.egg,node_modules,n8n_data
